<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="beaconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Base/Tower -->
  <rect x="35" y="60" width="30" height="35" rx="3" fill="url(#beaconGradient)" />

  <!-- Light beam -->
  <ellipse cx="50" cy="25" rx="20" ry="8" fill="#fbbf24" opacity="0.8" />

  <!-- Light rays -->
  <path d="M50 25 L70 15 L75 20 Z" fill="#fbbf24" opacity="0.6" />
  <path d="M50 25 L30 15 L25 20 Z" fill="#fbbf24" opacity="0.6" />
  <path d="M50 25 L65 40 L60 45 Z" fill="#fbbf24" opacity="0.6" />
  <path d="M50 25 L35 40 L40 45 Z" fill="#fbbf24" opacity="0.6" />

  <!-- Top light -->
  <circle cx="50" cy="25" r="8" fill="#fbbf24" />
  <circle cx="50" cy="25" r="4" fill="#ffffff" />

  <!-- Windows -->
  <rect x="42" y="68" width="4" height="3" fill="#ffffff" opacity="0.8" />
  <rect x="48" y="68" width="4" height="3" fill="#ffffff" opacity="0.8" />
  <rect x="42" y="74" width="4" height="3" fill="#ffffff" opacity="0.8" />
  <rect x="48" y="74" width="4" height="3" fill="#ffffff" opacity="0.8" />
</svg>